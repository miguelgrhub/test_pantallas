<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream en Vivo</title>
    <style>
        /* Limpiamos la pantalla */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }

        /* El video a pantalla completa */
        iframe { 
            width: 100vw; 
            height: 100vh; 
            border: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }

        /* Este es el escudo que bloqueará la pantalla después */
        #escudo-invisible { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 2; /* Se pone por encima del video */
            background: transparent; 
            display: none; /* Oculto al principio para dejarte darle Play */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.youtube.com/embed/NWH-ufhDdh0?autoplay=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>

    <div id="escudo-invisible"></div>

    <script>
        // Un temporizador que cuenta 10 segundos (10000 milisegundos)
        // Te da 10 segundos para tocar la pantalla y darle Play al video.
        // Después de eso, activa el escudo invisible para que ya no se pueda tocar.
        setTimeout(function() {
            document.getElementById('escudo-invisible').style.display = 'block';
        }, 10000); 
    </script>

</body>
</html>
