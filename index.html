<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream en Vivo</title>
    <style>
        /* Eliminamos cualquier margen blanco y barras de desplazamiento del navegador */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Fondo negro para que se vea elegante antes de cargar */
        }

        /* Hacemos que el video abarque exactamente el 100% de la ventana */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            /* Descomenta la siguiente línea si quieres bloquear los clics del mouse (para que no lo puedan pausar ni abrir en YouTube) */
            /* pointer-events: none; */ 
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.youtube.com/embed/ID_DEL_VIDEO?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3" 
        title="YouTube video player" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>

</body>
</html>
