<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream en Vivo</title>
    <style>
        body, html { 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000; 
        }
        /* El div que contendrá el video */
        #player { 
            width: 100vw; 
            height: 100vh; 
            pointer-events: none; /* Esto evita que toquen la pantalla y pausen el video */
        }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        // Carga la API de YouTube de forma asíncrona
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'TU_ID_AQUI', // PON EL ID DE TU VIDEO AQUÍ
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'mute': 1,      // CRUCIAL: Debe estar en 1 para que el navegador lo deje arrancar
                    'showinfo': 0,
                    'iv_load_policy': 3
                },
                events: {
                    // En cuanto el reproductor esté listo, forzamos el mute y el play
                    'onReady': function(event) {
                        event.target.mute();
                        event.target.playVideo();
                    }
                }
            });
        }
    </script>
</body>
</html>
