<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f171e; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .boton-prime {
            background-color: #00a8e1;
            color: white;
            text-decoration: none;
            font-size: 2.5rem;
            padding: 30px 60px;
            border-radius: 15px;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0, 168, 225, 0.4);
            transition: transform 0.1s;
        }

        .boton-prime:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <a href="https://www.primevideo.com" class="boton-prime">
        📺 Abrir Prime Video
    </a>

</body>
</html>
